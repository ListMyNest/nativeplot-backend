# CI for ListMyNest — runs on every push and pull request to main/master.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Gradle test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: listmynest-backend/listmynest-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run tests
        run: chmod +x ./gradlew && ./gradlew test --no-daemon

  frontend:
    name: Frontend (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: listmynest-frontend/listmynest-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: listmynest-frontend/listmynest-frontend/package-lock.json
      - name: Install and lint
        run: npm ci && npm run lint
